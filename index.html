<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VectoJS Creative Gallery</title>
    <meta
      name="description"
      content="Community-built interactive canvas creations — animations, physics, math art, and more — all rendered natively on VectoJS, with zero DOM."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="VectoJS Gallery" />
    <meta property="og:title" content="VectoJS Creative Gallery" />
    <meta
      property="og:description"
      content="Community-built interactive canvas creations — animations, physics, math art, and more — all rendered natively on VectoJS, with zero DOM."
    />
    <meta property="og:url" content="https://gallery.vectojs.org/" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="VectoJS Creative Gallery" />
    <meta
      name="twitter:description"
      content="Community-built interactive canvas creations — animations, physics, math art, and more — all rendered natively on VectoJS, with zero DOM."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-color: #f7f4ee;
        --text-color: #3d3529;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: var(--bg-color);
        color: var(--text-color);
        font-family: "Inter", sans-serif;
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <canvas id="gallery-canvas"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
